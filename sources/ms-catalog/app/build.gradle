 */

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id "io.freefair.lombok" version "8.6"
    id 'org.springframework.boot' version '3.3.2'
}

apply plugin: 'io.spring.dependency-management'

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {

    /************************************************************************/
    /** LOMBOK                                                              */
    /************************************************************************/
	compileOnly 'org.projectlombok:lombok:1.18.34'
	annotationProcessor 'org.projectlombok:lombok:1.18.34'

	testCompileOnly 'org.projectlombok:lombok:1.18.34'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.34'


    /************************************************************************/
    /** SPRING BOOT                                                         */
    /************************************************************************/
    // https://mvnrepository.com/artifact/org.springframework.boot/spring-boot-starter-web
    implementation 'org.springframework.boot:spring-boot-starter-web:3.3.2'


    /************************************************************************/
    /** SPRING BOOT TEST                                                    */
    /************************************************************************/
    // https://mvnrepository.com/artifact/org.springframework.boot/spring-boot-starter-test
    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.3.2'

    /************************************************************************/
    /** SPRING DATA JPA                                                     */
    /************************************************************************/
    // https://mvnrepository.com/artifact/org.springframework.boot/spring-boot-starter-data-jpa
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa:3.3.2'

    /************************************************************************/
    /** ModelMapper (Maps atributes between objects of different classes)   */
    /************************************************************************/
    // https://mvnrepository.com/artifact/org.modelmapper/modelmapper
    implementation 'org.modelmapper:modelmapper:3.2.1'

    /************************************************************************/
    /** SPRINGDOC (OpenAPI Swagger UI)                                      */
    /************************************************************************/
    // https://mvnrepository.com/artifact/org.springdoc/springdoc-openapi-starter-webmvc-ui
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.6.0'

    /************************************************************************/
    /** MariaDB DRIVER                                                      */
    /************************************************************************/
    // https://mvnrepository.com/artifact/org.mariadb.jdbc/mariadb-java-client
    implementation 'org.mariadb.jdbc:mariadb-java-client:3.4.1'


    ///************************************************************************/
    ///** TestContainers (Base package)                                       */
    ///************************************************************************/
    //// https://mvnrepository.com/artifact/org.testcontainers/testcontainers
    //testImplementation 'org.testcontainers:testcontainers:1.20.1'

    ///************************************************************************/
    ///** TestContainers (Spring framework integration)                       */
    ///************************************************************************/
    //// https://mvnrepository.com/artifact/org.springframework.boot/spring-boot-testcontainers
    //testImplementation 'org.springframework.boot:spring-boot-testcontainers:3.3.2'

    ///************************************************************************/
    ///** TestContainers (Junit Jupiter module)                               */
    ///************************************************************************/
    //// https://mvnrepository.com/artifact/org.testcontainers/junit-jupiter
    //testImplementation 'org.testcontainers:junit-jupiter:1.20.1'

    ///************************************************************************/
    ///** Testcontainers (MariaDB connection module)                          */
    ///************************************************************************/
    //// https://mvnrepository.com/artifact/org.testcontainers/mariadb
    //testImplementation 'org.testcontainers:mariadb:1.20.1'
    //
    ///************************************************************************/
    ///** REST Assured | Testing and validation of REST services              */
    ///************************************************************************/
    //// https://mvnrepository.com/artifact/io.rest-assured/rest-assured
    //testImplementation 'io.rest-assured:rest-assured:5.5.0'

    /************************************************************************/
    /** JUNIT                                                               */
    /************************************************************************/
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(22)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'com.microshop.catalog.CatalogApplication'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
